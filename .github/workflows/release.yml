name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: box
            context: ./box
          - name: outbound-proxy
            context: ./outbound-proxy
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Collect release artifacts
        run: |
          mkdir -p release
          cp docker-compose.prod.yml release/docker-compose.yml
          cp .env.example release/.env.example
          cp config.example.yml release/config.example.yml
          cp caddy/Caddyfile release/Caddyfile
          cp install.sh release/install.sh

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/docker-compose.yml
            release/.env.example
            release/config.example.yml
            release/Caddyfile
            release/install.sh
