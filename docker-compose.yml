services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      BOX_DOMAIN: ${BOX_DOMAIN}
    depends_on:
      - oauth2-proxy
      - box
    networks:
      - public

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${COOKIE_SECRET}
      OAUTH2_PROXY_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAIN}
      OAUTH2_PROXY_UPSTREAMS: "static://200"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_REDIRECT_URL: "https://${BOX_DOMAIN}/oauth2/callback"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_WHITELIST_DOMAINS: "${BOX_DOMAIN}"
    networks:
      - public

  outbound-proxy:
    build:
      context: ./outbound-proxy
    volumes:
      - ./config.yml:/etc/box/config.yml:ro
      - proxy_data:/data
      - proxy_ca:/ca
    environment:
      CONFIG_PATH: /etc/box/config.yml
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    networks:
      - isolated
      - internet

  box:
    build:
      context: ./box
    volumes:
      - workspace:/workspace
      - proxy_ca:/usr/local/share/ca-certificates/proxy:ro
    environment:
      BOX_DOMAIN: ${BOX_DOMAIN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HTTP_PROXY: http://outbound-proxy:3128
      HTTPS_PROXY: http://outbound-proxy:3128
      NO_PROXY: localhost,127.0.0.1
    depends_on:
      - outbound-proxy
    networks:
      - public
      - isolated

networks:
  public:
    driver: bridge
  isolated:
    driver: bridge
    internal: true
  internet:
    driver: bridge

volumes:
  workspace:
  caddy_data:
  caddy_config:
  proxy_data:
  proxy_ca:
