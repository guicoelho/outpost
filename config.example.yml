# Per-user outbound proxy config.
allowed_users:
  - alice@corp.com
  # - bob@corp.com   # uncomment to share this box

managed_tools:
  # GitHub API access with token injected by proxy.
  - name: github
    match: "*.github.com"
    protocol: http
    description: "GitHub API access"
    credentials:
      source: static
      header_name: "Authorization"
      header_value: "Bearer ${GITHUB_TOKEN}"
    policy:
      methods: [GET, HEAD]
      paths: ["/repos/myorg/**", "/user"]

  # Anthropic API — key injected by proxy so the box stays credential-free.
  - name: anthropic
    match: "api.anthropic.com"
    protocol: http
    description: "Anthropic API"
    credentials:
      source: static
      header_name: "x-api-key"
      header_value: "${ANTHROPIC_API_KEY}"
    policy:
      methods: [GET, POST]
      paths: ["/v1/**"]

  # OpenAI API with org-level policy and rate limiting.
  - name: openai
    match: "api.openai.com"
    protocol: http
    description: "OpenAI API with rate limiting"
    credentials:
      source: static
      header_name: "Authorization"
      header_value: "Bearer ${OPENAI_API_KEY}"
    policy:
      methods: [GET, POST]
      paths: ["/v1/**"]
      rate_limit: "200/hour"

  # Example PostgreSQL managed tool. Agent connects locally to this port.
  - name: salesdb
    match: "salesdb.internal:5432"
    protocol: postgres
    local_port: 5432
    description: "Sales database"
    database: "sales"
    credentials:
      source: static
      username: "${SALESDB_USER}"
      password: "${SALESDB_PASSWORD}"

blocked:
  - "*.competitor.com"
  - "*.malware-domain.net"
