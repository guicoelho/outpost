<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Welcome to Outpost</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafafa; color: #111; }
  .c { text-align: center; padding: 2rem; }
  h1 { font-size: 2rem; font-weight: 600; letter-spacing: -0.04em; line-height: 1; }
  p { margin-top: 0.75rem; font-size: 1.125rem; color: #666; }
  a { display: inline-block; margin-top: 1.5rem; padding: 0.625rem 1.5rem; font-size: 1rem; font-weight: 500; color: #fff; background: #111; border-radius: 0.375rem; text-decoration: none; }
  a:hover { background: #333; }
</style>
</head>
<body>
<div class="c">
  <h1>Welcome to Outpost</h1>
  {{if .SignInMessage}}<p>{{.SignInMessage}}</p>{{end}}
  <a href="{{.ProxyPrefix}}/start?rd={{.Redirect}}">Sign in with {{.ProviderName}}</a>
  {{if .CustomLogin}}
  <form method="POST" action="{{.ProxyPrefix}}/sign_in" style="margin-top: 1.5rem;">
    <input type="hidden" name="rd" value="{{.Redirect}}">
    <input type="text" name="username" placeholder="Username" style="display: block; width: 100%; padding: 0.5rem 0.75rem; margin-bottom: 0.5rem; font-size: 1rem; border: 1px solid #ddd; border-radius: 0.375rem;">
    <input type="password" name="password" placeholder="Password" style="display: block; width: 100%; padding: 0.5rem 0.75rem; margin-bottom: 0.75rem; font-size: 1rem; border: 1px solid #ddd; border-radius: 0.375rem;">
    <button type="submit" style="display: inline-block; padding: 0.625rem 1.5rem; font-size: 1rem; font-weight: 500; color: #fff; background: #111; border: none; border-radius: 0.375rem; cursor: pointer;">Sign in</button>
  </form>
  {{end}}
  {{if .Footer}}<p style="margin-top: 2rem; font-size: 0.875rem; color: #999;">{{.Footer}}</p>{{end}}
</div>
</body>
</html>
